<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        #overlay {
            position: absolute; z-index: 100; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000; cursor: pointer; transition: opacity 0.5s;
        }

        #overlay h2 { font-size: 0.8rem; letter-spacing: 5px; color: #666; font-weight: 300; }

        #quote-container {
            position: absolute; left: 50%; top: 25%; transform: translateX(-50%);
            width: 85%; text-align: center; z-index: 10;
        }

        p { 
            font-size: 1.5rem; line-height: 1.6; font-style: italic;
            margin-bottom: 15px; opacity: 0; transition: opacity 0.8s ease; color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <h2>[ TAP TO BEGIN ]</h2>
    </div>

    <div id="quote-container"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('quote-container');

        const quotes = [
            "Hey you !!",
            "There is a certain light in your smile...",
            "A quiet kind of healing that makes the world feel right.",
            "Your presence has that same magic—calm and rare.",
            "Hours feel like seconds when we talk...",
            "Gems like you are once-in-a-lifetime.",
            "Happy Birthday! ✨"
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                drawTree(canvas.width / 2, canvas.height, -90, 8, canvas.height * 0.22);
                typeQuotes();
                animate();
            }, 500);
        }

        function drawHeart(x, y, size, color, opacity) {
            ctx.globalAlpha = opacity;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y - size/2, x - size, y - size/2, x - size, y);
            ctx.bezierCurveTo(x - size, y + size/2, x, y + size, x, y + size);
            ctx.bezierCurveTo(x, y + size, x + size, y + size/2, x + size, y);
            ctx.bezierCurveTo(x + size, y - size/2, x, y - size/2, x, y);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawTree(x1, y1, angle, thickness, len) {
            if (len < 10) return;
            const x2 = x1 + Math.cos(angle * Math.PI / 180) * len;
            const y2 = y1 + Math.sin(angle * Math.PI / 180) * len;

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = thickness;
            ctx.lineCap = 'round';
            ctx.stroke();

            setTimeout(() => {
                drawTree(x2, y2, angle - 22, thickness * 0.7, len * 0.8);
                drawTree(x2, y2, angle + 22, thickness * 0.7, len * 0.8);
            }, 60); // Faster tree growth
        }

        let particles = Array.from({length: 45}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            s: Math.random() * 5 + 2,
            v: Math.random() * 1.5 + 0.8,
            o: Math.random() * 0.5 + 0.2
        }));

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.v;
                p.x += Math.sin(p.y / 40) * 0.5; // Smooth sway
                if(p.y > canvas.height) {
                    p.y = -10;
                    p.x = Math.random() * canvas.width;
                }
                drawHeart(p.x, p.y, p.s, '#ffb7c5', p.o);
            });
            requestAnimationFrame(animate);
        }

        async function typeQuotes() {
            for (let q of quotes) {
                let p = document.createElement('p');
                container.appendChild(p);
                
                // Faster typing
                for (let i = 0; i <= q.length; i++) {
                    p.innerHTML = q.substring(0, i);
                    p.style.opacity = '1';
                    await new Promise(r => setTimeout(r, 35)); // 35ms per char
                }
                
                await new Promise(r => setTimeout(r, 1500)); // 1.5s pause between lines
                
                if (q !== quotes[quotes.length - 1]) {
                    p.style.opacity = '0.2'; // Mute old lines faster
                }
            }
        }
    </script>
</body>
</html>
