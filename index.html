<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Her 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital@1&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0a0a0a; color: #fff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Playfair Display', serif;
        }

        #overlay {
            position: absolute; z-index: 100; text-align: center; cursor: pointer;
            transition: opacity 1s ease;
        }

        #overlay h2 { font-size: 1.5rem; letter-spacing: 5px; animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .content { position: relative; width: 100vw; height: 100vh; display: none; }

        #quote-container {
            position: absolute; left: 10%; top: 40%; transform: translateY(-50%);
            width: 35%; font-size: 1.8rem; line-height: 1.6; font-style: italic;
        }

        #canvas { position: absolute; right: 0; bottom: 0; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <h2>[ CLICK TO BLOOM ]</h2>
    </div>

    <div class="content" id="main-content">
        <div id="quote-container"></div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const quotes = [
            "In the garden of time...",
            "One soul bloomed brighter than the rest.",
            "A cosmic accident? Or destiny's art?",
            "Today, the stars celebrate you.",
            "Happy Birthday, My Constant. ✨"
        ];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let animationStarted = false;

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').classList.add('hidden');
                document.getElementById('main-content').style.display = 'block';
                initTree();
                typeQuotes();
            }, 1000);
        }

        // --- Typewriter Logic ---
        async function typeQuotes() {
            const container = document.getElementById('quote-container');
            for (let quote of quotes) {
                let i = 0;
                let span = document.createElement('p');
                container.appendChild(span);
                while (i < quote.length) {
                    span.innerHTML += quote.charAt(i);
                    i++;
                    await new Promise(r => setTimeout(r, 70));
                }
                await new Promise(r => setTimeout(r, 1500));
                if (quote !== quotes[quotes.length -1]) span.style.opacity = '0.5';
            }
        }

        // --- Tree Growth Logic ---
        function initTree() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Drawing the tree at the bottom right
            drawBranch(canvas.width * 0.75, canvas.height, -90, 10, 120);
        }

        function drawBranch(x, y, angle, thickness, len) {
            if (len < 10) {
                drawHeart(x, y);
                return;
            }

            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = "#4a2c2a";
            ctx.lineWidth = thickness;
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            setTimeout(() => {
                drawBranch(0, -len, angle + (Math.random() * 25), thickness * 0.8, len * 0.8);
                drawBranch(0, -len, angle - (Math.random() * 25), thickness * 0.8, len * 0.8);
            }, 100);
            ctx.restore();
        }

        function drawHeart(x, y) {
            ctx.fillStyle = `hsla(${Math.random() * 20 + 340}, 80%, 70%, 0.8)`;
            ctx.beginPath();
            const size = Math.random() * 8 + 4;
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y - size/2, x - size, y - size/2, x - size, y);
            ctx.bezierCurveTo(x - size, y + size/2, x, y + size, x, y + size);
            ctx.bezierCurveTo(x, y + size, x + size, y + size/2, x + size, y);
            ctx.bezierCurveTo(x + size, y - size/2, x, y - size/2, x, y);
            ctx.fill();
        }
    </script>
</body>
</html>
