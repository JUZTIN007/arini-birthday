<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,500&family=Quicksand:wght@300;400&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #080808; color: #fff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Quicksand', sans-serif;
        }

        #overlay {
            position: absolute; z-index: 100; text-align: center; cursor: pointer;
            width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
            background: #080808;
        }

        #overlay h2 { 
            font-family: 'Playfair Display', serif; font-size: 1rem;
            letter-spacing: 5px; color: #888; animation: pulse 2s infinite; 
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #quote-container {
            position: absolute; left: 50%; top: 20%; transform: translateX(-50%);
            width: 85%; text-align: center; font-family: 'Playfair Display', serif;
            font-size: 1.3rem; line-height: 1.6; font-style: italic; z-index: 10;
        }

        canvas { position: absolute; bottom: 0; left: 0; pointer-events: none; }
        p { margin-bottom: 12px; transition: opacity 1s; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <h2>[ TAP TO BLOOM ]</h2>
    </div>

    <div id="quote-container"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('quote-container');

        const quotes = [
            "Hey you !!",
            "There is a certain light in your smile...",
            "A quiet kind of healing that makes the world feel right.",
            "Your presence has that same magic—calm and rare.",
            "It’s strange how hours feel like seconds when we talk...",
            "But then again, gems like you are once-in-a-lifetime.",
            "Happy Birthday! Keep being your wonderful self. ✨"
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        function startExperience() {
            document.getElementById('overlay').style.display = 'none';
            drawTree(canvas.width / 2, canvas.height - 20, -90, 9, canvas.height * 0.2);
            typeQuotes();
        }

        // --- Tree Growth Function ---
        function drawTree(x1, y1, angle, thickness, len) {
            if (len < 8) {
                drawBloom(x1, y1);
                return;
            }

            const x2 = x1 + Math.cos(angle * Math.PI / 180) * len;
            const y2 = y1 + Math.sin(angle * Math.PI / 180) * len;

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#3d2b2a'; // Brownish trunk
            ctx.lineWidth = thickness;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Growth effect speed
            setTimeout(() => {
                drawTree(x2, y2, angle - (Math.random() * 20 + 10), thickness * 0.7, len * 0.78);
                drawTree(x2, y2, angle + (Math.random() * 20 + 10), thickness * 0.7, len * 0.78);
            }, 150);
        }

        function drawBloom(x, y) {
            for(let i=0; i<3; i++) {
                setTimeout(() => {
                    const r = Math.random() * 6 + 2;
                    ctx.beginPath();
                    ctx.arc(x + (Math.random()-0.5)*30, y + (Math.random()-0.5)*30, r, 0, Math.PI*2);
                    ctx.fillStyle = `hsla(${Math.random() * 30 + 340}, 70%, 80%, 0.6)`; // Soft Pink/White
                    ctx.fill();
                }, Math.random() * 1500);
            }
        }

        // --- Typewriter Logic ---
        async function typeQuotes() {
            for (let quote of quotes) {
                let p = document.createElement('p');
                container.appendChild(p);
                for (let i = 0; i < quote.length; i++) {
                    p.innerHTML += quote.charAt(i);
                    await new Promise(r => setTimeout(r, 50));
                }
                await new Promise(r => setTimeout(r, 1800));
                if (quote !== quotes[quotes.length -1]) p.style.opacity = '0.3';
            }
        }
    </script>
</body>
</html>
