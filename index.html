<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Playfair+Display:ital,wght@1,500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0a0a 0%, #050505 100%);
            color: #fff; overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        #overlay {
            position: absolute; z-index: 100; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000; cursor: pointer; transition: 1s;
        }

        #overlay h2 { 
            font-size: 1rem; letter-spacing: 6px; color: #666;
            animation: pulse 2s infinite; 
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #quote-container {
            position: absolute; left: 50%; top: 20%; transform: translateX(-50%);
            width: 85%; text-align: center; z-index: 10;
        }

        p { 
            font-size: 1.4rem; line-height: 1.8; font-style: italic;
            margin-bottom: 20px; opacity: 0; transform: translateY(10px);
            transition: 1.5s all ease; color: #f0f0f0;
        }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <h2>[ TAP TO FEEL ]</h2>
    </div>

    <div id="quote-container"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('quote-container');

        const quotes = [
            "Hey you !!",
            "There is a certain light in your smile...",
            "A quiet kind of healing that makes the world feel right.",
            "Your presence has that same magic—calm and rare.",
            "Hours feel like seconds when we talk...",
            "Gems like you are once-in-a-lifetime.",
            "Happy Birthday! Keep being your wonderful self. ✨"
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                // Start tree, typing, and falling hearts together for impact
                drawTree(canvas.width / 2, canvas.height - 20, -90, 8, canvas.height * 0.22);
                typeQuotes();
                animateFall();
            }, 1000);
        }

        // --- Heart Drawing ---
        function drawHeart(x, y, size, color, opacity) {
            ctx.globalAlpha = opacity;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y - size/2, x - size, y - size/2, x - size, y);
            ctx.bezierCurveTo(x - size, y + size/2, x, y + size, x, y + size);
            ctx.bezierCurveTo(x, y + size, x + size, y + size/2, x + size, y);
            ctx.bezierCurveTo(x + size, y - size/2, x, y - size/2, x, y);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }

        // --- Tree Growth (Faster & Smoother) ---
        function drawTree(x1, y1, angle, thickness, len) {
            if (len < 10) {
                for(let i=0; i<3; i++) {
                    const color = `hsl(${Math.random() * 20 + 340}, 70%, 70%)`;
                    drawHeart(x1 + (Math.random()-0.5)*30, y1 + (Math.random()-0.5)*30, Math.random()*5+3, color, 0.8);
                }
                return;
            }

            const x2 = x1 + Math.cos(angle * Math.PI / 180) * len;
            const y2 = y1 + Math.sin(angle * Math.PI / 180) * len;

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#2d1b1a';
            ctx.lineWidth = thickness;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Faster branching
            setTimeout(() => {
                drawTree(x2, y2, angle - (Math.random() * 20 + 15), thickness * 0.7, len * 0.8);
                drawTree(x2, y2, angle + (Math.random() * 20 + 15), thickness * 0.7, len * 0.8);
            }, 100); 
        }

        // --- Falling Hearts (The Emotion) ---
        let hearts = [];
        for(let i=0; i<50; i++) {
            hearts.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 6 + 2,
                speed: Math.random() * 1.5 + 0.5,
                opacity: Math.random() * 0.5 + 0.2,
                color: `hsl(${Math.random() * 30 + 340}, 80%, 75%)`
            });
        }

        function animateFall() {
            // Keep the tree by not clearing the whole canvas, or use two canvases.
            // Simplified: We clear a bit of the overlay to keep the fall smooth
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height / 1.5); 

            hearts.forEach(h => {
                h.y += h.speed;
                if(h.y > canvas.height) h.y = -10;
                drawHeart(h.x, h.y, h.size, h.color, h.opacity);
            });
            requestAnimationFrame(animateFall);
        }

        // --- Typewriter (More Impactful) ---
        async function typeQuotes() {
            for (let quote of quotes) {
                let p = document.createElement('p');
                container.appendChild(p);
                // Trigger fade in
                setTimeout(() => { p.style.opacity = '1'; p.style.transform = 'translateY(0)'; }, 100);
                
                for (let i = 0; i < quote.length; i++) {
                    p.innerHTML += quote.charAt(i);
                    await new Promise(r => setTimeout(r, 40)); 
                }
                await new Promise(r => setTimeout(r, 2000));
                if (quote !== quotes[quotes.length - 1]) p.style.opacity = '0.2';
            }
        }
    </script>
</body>
</html>
